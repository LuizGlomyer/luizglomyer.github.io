<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" class="checkerboard"><style>svg{isolation:isolate;overflow:visible}.ellipse{mix-blend-mode:screen}.red{fill:red}.green{fill:#0f0}.blue{fill:#00f}.reference-point{fill:#000}.checkerboard{overflow:visible;width:100%;height:100%;background-color:#fff;background-image:linear-gradient(45deg,rgba(0,0,0,.1) 25%,transparent 25%,transparent 75%,rgba(0,0,0,.1) 75%,rgba(0,0,0,.1)),linear-gradient(45deg,rgba(0,0,0,.1) 25%,transparent 25%,transparent 75%,rgba(0,0,0,.1) 75%,rgba(0,0,0,.1));background-size:20px 20px;background-position:0 0,10px 10px}</style><defs><g id="R1"><ellipse rx="100" ry="100"><animateTransform attributeName="transform" dur="1s" from="0" repeatCount="indefinite" to="360" type="rotate"/><animate attributeName="cx" dur="20s" repeatCount="indefinite" values="0; 150; 0"/></ellipse></g></defs><circle cx="250" cy="250" r="1.5" class="reference-point"/><use class="red ellipse" href="#R1" transform="rotate(120 250 250) translate(300 300)"/><use class="green ellipse" href="#R1" transform="rotate(240 250 250) translate(300 300)"/><use class="blue ellipse" href="#R1" transform="rotate(360 250 250) translate(300 300)"/></svg>