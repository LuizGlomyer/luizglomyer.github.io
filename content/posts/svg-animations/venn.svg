<svg class="checkerboard" width="500" height="500" xmlns="http://www.w3.org/2000/svg">
  <style>
    body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    }

    svg {
    isolation: isolate;
    overflow: visible;
    }

    .ellipse {
    mix-blend-mode: screen;
    }

    .red {
    fill: rgb(255, 0, 0);
    }

    .green {
    fill: rgb(0, 255, 0);
    }

    .blue {
    fill: rgb(0, 0, 255);
    }

    .reference-point {
    fill: black;
    }

    .checkerboard {
    overflow: visible;

    width: 100%;
    height: 100%;
    /* Fallback color */
    background-color: #fff;
    background-image: linear-gradient(
    45deg,
    rgba(0, 0, 0, 0.1) 25%,
    transparent 25%,
    transparent 75%,
    rgba(0, 0, 0, 0.1) 75%,
    rgba(0, 0, 0, 0.1)
    ),
    linear-gradient(
    45deg,
    rgba(0, 0, 0, 0.1) 25%,
    transparent 25%,
    transparent 75%,
    rgba(0, 0, 0, 0.1) 75%,
    rgba(0, 0, 0, 0.1)
    );
    background-size: 20px 20px;
    background-position: 0 0, 10px 10px;
    }

  </style>
  <defs>
    <g id="R1">
      <ellipse rx="100" ry="100">
        <animateTransform attributeName="transform" type="rotate" dur="1s" from="0" to="360"
          repeatCount="indefinite" />
        <animate attributeName="cx" dur="20s" values="0; 150; 0" repeatCount="indefinite" />
      </ellipse>
    </g>
  </defs>

  <!-- Draw the reference point at (310, 350) -->
  <circle cx="250" cy="250" r="1.5" class="reference-point" />

  <use href="#R1" transform="rotate(120 250 250) translate(300 300)" class="red ellipse" />
  <use href="#R1" transform="rotate(240 250 250) translate(300 300)" class="green ellipse" />
  <use href="#R1" transform="rotate(360 250 250) translate(300 300)" class="blue ellipse" />
</svg>